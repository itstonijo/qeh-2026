name: Deploy site to GitHub Pages

# Publishes the static site (index.html, calculator.html, assets/) to GitHub
# Pages. After the first run, set Settings ▸ Pages ▸ Source to "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "calculator.html"
      - "assets/**"
      - "campaigns/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Repo root is the site root — it's a plain static site, no build step.
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
