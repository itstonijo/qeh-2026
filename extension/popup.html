<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    :root { color-scheme: light dark; }
    body {
      width: 320px;
      margin: 0;
      padding: 14px;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    h1 { font-size: 14px; margin: 0 0 2px; }
    p.sub { margin: 0 0 12px; opacity: 0.7; font-size: 12px; }
    fieldset { border: 1px solid rgba(128,128,128,0.35); border-radius: 8px; margin: 0 0 12px; padding: 8px 10px; }
    legend { padding: 0 4px; font-weight: 600; font-size: 12px; }
    label.row { display: flex; align-items: center; gap: 8px; padding: 3px 0; cursor: pointer; }
    input[type="text"] {
      width: 100%; box-sizing: border-box; margin-top: 6px; padding: 6px 8px;
      border: 1px solid rgba(128,128,128,0.4); border-radius: 6px; font: inherit;
    }
    button {
      width: 100%; padding: 9px; border: 0; border-radius: 8px; cursor: pointer;
      background: #2b6fff; color: #fff; font-weight: 600; font-size: 13px;
    }
    button:disabled { opacity: 0.6; cursor: default; }
    .status { margin-top: 10px; min-height: 16px; font-size: 12px; opacity: 0.85; }
    .hint { font-size: 11px; opacity: 0.6; margin: 2px 0 0; }
  </style>
</head>
<body>
  <h1>DOM Scrobe</h1>
  <p class="sub">Extract data from the current page → download JSON.</p>

  <fieldset>
    <legend>What to grab</legend>
    <label class="row"><input type="checkbox" id="opt-links" checked /> Links &amp; text</label>
    <label class="row"><input type="checkbox" id="opt-tables" checked /> Tables</label>
    <label class="row"><input type="checkbox" id="opt-meta" checked /> Structured / meta</label>
    <label class="row"><input type="checkbox" id="opt-selector" /> Custom CSS selector</label>
    <input type="text" id="selector" placeholder="e.g. .product-card .price" />
    <p class="hint">Matches are included only when this box is ticked.</p>
  </fieldset>

  <button id="run">Extract &amp; download</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
