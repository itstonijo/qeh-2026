    if(p == null){ if(cb) cb(); return; }
    this.state = {...this.state, ...p};
    if(!this._silent) this.render();
    if(cb) cb();
  }
  componentDidMount(){
    try{ const s=JSON.parse(localStorage.getItem('ironside-pe-v2')||'{}');
      this.setState(st=>({...st,
        done:s.done||{}, skipped:s.skipped||{}, queued:s.queued||[], parked:s.parked||[],
        weekBatch:s.weekBatch||null, batchOf:s.batchOf||'',
        bank:Array.isArray(s.bank)?s.bank:[], published:Array.isArray(s.published)?s.published:[],
        cal:s.cal||'rows', mode:s.mode==='auto'?'auto':'manual'})); }catch(e){}
  }
  persist(extra){
    const s={...this.state,...extra};
    try{ localStorage.setItem('ironside-pe-v2', JSON.stringify({
      done:s.done, skipped:s.skipped, queued:s.queued, parked:s.parked, weekBatch:s.weekBatch, batchOf:s.batchOf, cal:s.cal, bank:s.bank, published:s.published, mode:s.mode})); return true; }catch(e){ return false; }
  }
  set(patch){ this.setState(patch); this.persist(patch); }
  toast(t){ const id=Date.now(); this.setState({toast:t,toastT:id});
    setTimeout(()=>this.setState(st=>st.toastT===id?{toast:''}:null),2600); }
  copyText(t){
    try{ if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(t); return; } }catch(e){}
    try{ const ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.left='-9999px'; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); ta.remove(); }catch(e){}
  }

  // ---- posts archive + tracking ----
  recordPost(p){
    p=p||{};
    const body=(p.body||'').trim();
    const dupSlot=p.slotId && (this.state.published||[]).some(x=>x.slotId===p.slotId);
    const dupBody=body && (this.state.published||[]).some(x=>(x.body||'').trim()===body);
    if(dupSlot||dupBody) return null;
    const now=new Date();
    const entry={
      id:'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),
      ts:now.getTime(),
      dateLabel:now.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}),
      slotId:p.slotId||null, pillar:p.pillar||null,
      pillarName:this.pillarName(p.pillar)||p.pillarName||'',
      hook:(p.hook||body.split('\n').find(l=>l.trim())||'').trim().slice(0,160),
      body, hashtags:(p.hashtags||'').trim(), ask:(p.ask||'').trim(),
      imgUrl:null, metrics:{impressions:'',reactions:'',comments:'',reposts:''}, note:'' };
    this.set({published:[entry,...(this.state.published||[])]});
    if(p.imgUrl){ this.thumbify(p.imgUrl,360).then(thumb=>{ if(!thumb) return;
      this.setState(st=>({published:(st.published||[]).map(e=>e.id===entry.id?{...e,imgUrl:thumb}:e)}),()=>this.persist({})); }).catch(()=>{}); }
    return entry;
  }
  thumbify(src,max){ return new Promise((res)=>{ try{ const im=new Image();
    im.onload=()=>{ try{ let w=im.naturalWidth||max,h=im.naturalHeight||max; const sc=Math.min(1,max/Math.max(w,h));
      w=Math.round(w*sc); h=Math.round(h*sc); const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(im,0,0,w,h); res(c.toDataURL('image/jpeg',0.72)); }catch(e){ res(null); } };
    im.onerror=()=>res(null); im.src=src; }catch(e){ res(null); } }); }
  setMetric(id,key,val){ const v=String(val||'').replace(/[^0-9]/g,'').slice(0,9);
    this.set({published:(this.state.published||[]).map(p=>p.id===id?{...p,metrics:{...(p.metrics||{}),[key]:v}}:p)}); }
  setPostNote(id,val){ this.set({published:(this.state.published||[]).map(p=>p.id===id?{...p,note:val}:p)}); }
  deletePost(id){ this.set({published:(this.state.published||[]).filter(p=>p.id!==id)}); this.toast('Removed from posts'); }
  csvCell(v){ return '"'+String(v==null?'':v).replace(/"/g,'""')+'"'; }
  exportPosts(){
    const pub=this.state.published||[];
    if(!pub.length){ this.toast('No posts to export yet'); return; }
    const rows=[['Date','Pillar','Hook','Post','Hashtags','Ask','Impressions','Reactions','Comments','Reposts','Engagement %','Notes']];
    pub.forEach(p=>{ const m=p.metrics||{}; const imp=parseInt(m.impressions,10)||0;
      const eng=(parseInt(m.reactions,10)||0)+(parseInt(m.comments,10)||0)+(parseInt(m.reposts,10)||0);
      const rate=imp?((eng/imp)*100).toFixed(1):'';
      rows.push([p.dateLabel,p.pillarName,p.hook,(p.body||'').replace(/\s*\n+\s*/g,' / '),p.hashtags,p.ask,m.impressions,m.reactions,m.comments,m.reposts,rate,p.note]); });
    const csv=rows.map(r=>r.map(c=>this.csvCell(c)).join(',')).join('\r\n');
    try{ const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}); const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download='ironside-posts-'+new Date().toISOString().slice(0,10)+'.csv';
      document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
    }catch(e){}
    this.toast('Exported '+pub.length+' posts to CSV'); }

  buildWeeks(){
    const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const PLAN={jobad:'Job ad',journey:'Candidate journey',employer:'Employer education',
      personal:'Personal update',skill:'Skill translation',share:'Share a post'};
    const fmt=(dt)=>dt.getDate()+' '+MON[dt.getMonth()];
    const pad=(n)=>String(n).padStart(2,'0');
    const slotId=(dt,suf)=>''+dt.getFullYear()+pad(dt.getMonth()+1)+pad(dt.getDate())+suf;
    const addDays=(dt,n)=>{const d=new Date(dt);d.setDate(d.getDate()+n);return d;};
    const today=new Date(); today.setHours(0,0,0,0);
    const dow=(today.getDay()+6)%7;
    let tue=addDays(today, 1-dow);
    if(dow>4){ tue=addDays(tue,7); }
    const EPOCH_TUE=Date.UTC(2026,0,6);
    const labels=['This week','Next week','In three weeks'];
    const mk=(id,day,date,time,pillar,prime,optional)=>({id,day,date,time,pillar,plan:PLAN[pillar],prime:!!prime,optional:!!optional});
    const weeks=[];
    for(let i=0;i<3;i++){
      const wTue=addDays(tue,i*7), wWed=addDays(wTue,1), wThu=addDays(wTue,2), wFri=addDays(wTue,3);
      const weekNum=Math.round((Date.UTC(wTue.getFullYear(),wTue.getMonth(),wTue.getDate())-EPOCH_TUE)/(7*86400000));
      const even=((weekNum%2)+2)%2===0;
      const tueP=even?'jobad':'skill';
      const wedP=even?'journey':'share';
      weeks.push({label:labels[i], of:fmt(wTue), slots:[
        mk(slotId(wTue,'tue'),'Tue',fmt(wTue),'7:30am',tueP,true,false),
        mk(slotId(wWed,'wed'),'Wed',fmt(wWed),'12:00pm',wedP,false,false),
        mk(slotId(wThu,'thu'),'Thu',fmt(wThu),'7:30am','employer',false,false),
        mk(slotId(wFri,'fri'),'Fri',fmt(wFri),'optional','personal',false,true),
      ]});
    }
    return weeks;
  }

  async doGenerate(){
    const id=this.state.pillar; if(!id) return;
    if(id==='custom'){
      const text=(this.state.custom||'').trim();
      if(!text){ this.toast('Write or paste your post first'); return; }
      const passthrough=(toastMsg)=>{
        const hook=(text.split('\n').find(l=>l.trim())||text).trim().slice(0,140);
        const had=(this.state.drafts||[]).length>0;
        const d={hook, body:text, hashtags:'', ask:'', photo:'Optional'};
        this.setState({genLoading:false, polishMode:false, drafts:[{...d, id:'d'+Date.now()+'_0', editing:false, editBuffer:d.body, img:this.defImg()}]},
          ()=>{ this.revealDrafts(); this.toast(toastMsg || (had?'':'Your draft is ready below')); });
      };
      if(!window.claude || !window.claude.complete){ passthrough(); return; }
      this.setState({genLoading:true, genError:'', drafts:[], polishMode:true}, ()=>this.revealDrafts());
      try{
        const d=await this.aiPolishCustom(text);
        this.setState({genLoading:false, polishMode:false, drafts:[{...d, id:'d'+Date.now()+'_0', editing:false, editBuffer:d.body, img:this.defImg()}]},
          ()=>{ this.revealDrafts(); this.toast('Polished and optimised for reach'); });
      }catch(e){ passthrough('AI was unavailable — used your text as is'); }
      return;
    }
    const subject = id==='jobad' ? '' : (this.state.anchor||'').trim();
    if(!subject || !window.claude || !window.claude.complete){ this.genFromPool(id); return; }
    this.setState({genLoading:true, genError:'', drafts:[]}, ()=>this.revealDrafts());
    try{
      const posts=await this.aiPosts(id, subject);
      const drafts=posts.map((d,i)=>({...d, id:'d'+Date.now()+'_'+i, editing:false, editBuffer:d.body, img:this.defImg()}));
      this.setState({drafts, genLoading:false}, ()=>{ this.revealDrafts(); this.toast('Three drafts about your subject'); });
    }catch(e){
      this.setState({genLoading:false});
      this.genFromPool(id);
      this.toast('AI was unavailable — used your library');
    }
  }
  genFromPool(id){
    const pool=this.POOLS[id]||[]; if(!pool.length){ this.setState({genLoading:false}); return; }
    const off=this.state.regen%pool.length;
    let picks=[]; for(let i=0;i<3;i++) picks.push({...pool[(off+i)%pool.length]});

    this.setState(st=>({drafts:st.drafts.filter(x=>x.id!==d.id)})); this.toast('Parked'); }
  unpark(i){ const pk=this.state.parked[i]; this.set({parked:this.state.parked.filter((_,j)=>j!==i)});
    this.setState({view:'compose', pillar:pk.pillar, drafts:[{...pk,id:'d'+Date.now(),editing:false,editBuffer:pk.body, img:this.defImg()}]}); }

  openQueue(d){ this.setState({queueForId:d.id, _queueDraft:d}); }
  closeQueue(){ this.setState({queueForId:null}); }
  pickQueueSlot(slot){
    const d=this.state._queueDraft; if(!d) return;
    const task={id:'t'+Date.now(), slotId:slot.id, when:`${slot.day} ${slot.date}, ${this.timeLabel(slot)}`,
      pillar:this.state.pillar, hook:d.hook, body:d.body, hashtags:d.hashtags, ask:d.ask, note:''};
    this.set({queued:[...this.state.queued, task], queueForId:null});
    this.setState(st=>({drafts:st.drafts?st.drafts.filter(x=>x.id!==d.id):st.drafts}));
    this.toast('Queued. It comes back to you at the slot time.');
  }
  setMode(m){ const v=m==='auto'?'auto':'manual'; this.set({mode:v});
    this.toast(v==='auto'?'Auto-schedule on — approved posts go out automatically':'Manual mode — you post each one yourself'); }
  approveTask(t){
    if(this.state.mode==='auto'){
      this.recordPost({slotId:t.slotId, pillar:t.pillar, hook:t.hook, body:t.body, hashtags:t.hashtags, ask:t.ask, auto:true});
      this.set({queued:this.state.queued.filter(x=>x.id!==t.id), done:{...this.state.done,[t.slotId]:true}});
      this.toast('Approved — auto-posted and tracked');
      return;
    }
    const txt=t.body+(t.hashtags?('\n\n'+t.hashtags):'')+(t.ask?('\n\n'+t.ask):'');
    this.openHandoff({text:txt, imgUrl:null, slug:'ironside-post', post:{slotId:t.slotId, pillar:t.pillar, hook:t.hook, body:t.body, hashtags:t.hashtags, ask:t.ask}, onComplete:()=>{
      this.set({queued:this.state.queued.filter(x=>x.id!==t.id), done:{...this.state.done,[t.slotId]:true}});
      this.toast('Approved and marked as posted');
    }});
  }
  requestChanges(t){ const note=prompt('What should change?', t.note||'');
    if(note===null) return;
    this.set({queued:this.state.queued.map(x=>x.id===t.id?{...x,note}:x)}); this.toast('Change requested'); }
  cancelTask(t){ this.set({queued:this.state.queued.filter(x=>x.id!==t.id)}); }

  markDone(s){ const v=!this.state.done[s.id];
    this.set({done:{...this.state.done,[s.id]:v}});
    if(v) this.recordPost({slotId:s.id, pillar:s.pillar, hook:s.plan, body:''});
    this.toast(v?'Marked done':'Unmarked'); }
  skipSlot(s){ const v=!this.state.skipped[s.id];
    const sk={...this.state.skipped}; if(v){ sk[s.id]=true; } else { delete sk[s.id]; }
    this.set({skipped:sk, queued:v?this.state.queued.filter(q=>q.slotId!==s.id):this.state.queued});
    this.toast(v?'Marked as not posting':'Back on the calendar'); }
  startSlot(s){ this.setState({view:'compose', pillar:s.pillar, drafts:null, regen:0}, ()=>this.doGenerate()); }

  prepareWeek(){
    const wk=this.WEEKS[1];
    const batch=wk.slots.map((s,i)=>{ const pool=this.POOLS[s.pillar]; const d=pool[i%pool.length];
      return {slotId:s.id, day:s.day, date:s.date, pillar:s.pillar, pillarName:this.pillarName(s.pillar),
        hook:d.hook, body:d.body, hashtags:d.hashtags, ask:d.ask, preview:d.body.split('\n\n')[1]||d.body}; });
    this.set({weekBatch:batch, batchOf:'week of '+wk.of, view:'approvals'});
    this.toast('Next week drafted. Review below.');
  }
  queueBatch(b){
    const task={id:'t'+Date.now(), slotId:b.slotId, when:`${b.day} ${b.date}`, pillar:b.pillar,
      hook:b.hook, body:b.body, hashtags:b.hashtags, ask:b.ask, note:''};
    this.set({queued:[...this.state.queued,task], weekBatch:this.state.weekBatch.filter(x=>x.slotId!==b.slotId)});
    this.toast('Queued for approval');
  }
  doneBatch(b){ this.recordPost({slotId:b.slotId, pillar:b.pillar, hook:b.hook, body:b.body, hashtags:b.hashtags, ask:b.ask});
    this.set({done:{...this.state.done,[b.slotId]:true}, weekBatch:this.state.weekBatch.filter(x=>x.slotId!==b.slotId)});
    this.toast('Marked done'); }

  timeLabel(s){ return s.optional? 'Friday, optional' : s.time; }

  // ---- style helpers ----
  topBtn(active){ return `display:inline-flex;align-items:center;justify-content:center;box-sizing:border-box;min-width:108px;border:none;border-radius:8px;padding:8px 15px;font-family:'Archivo';font-weight:600;font-size:13.5px;cursor:pointer;${active?'background:#F37835;color:#fff;':'background:transparent;color:#9FB1C6;'}`; }
  modeSeg(active){ return `border:none;border-radius:7px;padding:6px 12px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:'Archivo';letter-spacing:.01em;transition:all .12s;${active?'background:#F37835;color:#fff;':'background:transparent;color:#9FB2C8;'}`; }
  seg(active){ return `border:none;border-radius:6px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Public Sans';${active?'background:#fff;color:#102A44;box-shadow:0 1px 2px rgba(0,0,0,.12);':'background:transparent;color:#8A8F98;'}`; }

  renderVals(){
    const st=this.state;
    const view=st.view;
    const titles={calendar:['Content calendar','Your next three weeks, built from your weekly cadence.'],
      compose:['Compose a post','Pick a pillar, set the angle, get three drafts to choose from.'],
      approvals:['Approvals','Nothing publishes until you say so.'],
      posts:['Your posts','Every post you have published, with the numbers behind it.']};
    const t=titles[view];

    const planned=this.allSlots().filter(s=>this.slotStatus(s)==='planned');
    const next=planned[0];

    const weeks=this.WEEKS.map(w=>({label:w.label, of:w.of, slots:w.slots.map(s=>this.slotVals(s))}));

    const cols=[
      {key:'planned', title:'Planned', dot:'#F2C3AC', headBg:'#FDF1E9'},
      {key:'queued', title:'Queued for approval', dot:'#9FD3AE', headBg:'#ECF6EF'},
      {key:'done', title:'Done', dot:'#CFCCC2', headBg:'#F4F3EF'},
      {key:'skipped', title:'Not posting', dot:'#CFCCC2', headBg:'#F1EFEA'},
    ].map(c=>{ const items=this.allSlots().filter(s=>this.slotStatus(s)===c.key).map(s=>this.slotVals(s));
      return {...c, count:items.length, items}; });

    const pillars=this.PILLARS.map(p=>{ const sel=st.pillar===p.id;
      return {...p, onPick:()=>this.selectPillar(p.id),
        cardStyle:`background:${sel?'#FFF6F0':'#fff'};border:1.5px solid ${sel?'#F37835':'#E4E1D8'};border-radius:12px;padding:15px 16px;cursor:pointer;text-align:left;transition:all .12s;`,
        hexStroke:sel?'#F37835':'#102A44', hexFill:sel?'#F37835':'none', numColor:sel?'#fff':'#102A44'}; });

    const drafts=(st.drafts||[]).map(d=>{
      const im=d.img||this.defImg();
      const aspectCss = im.shape==='portrait'?'4 / 5' : (im.shape==='landscape'?'1.91 / 1' : '1 / 1');
      const tile=this.TILES[st.pillar]||ASSETS['tile-hex'];
      const photoUrl=(this._photos&&this._photos[d.id])||null;
      return {
      id:d.id, hook:d.hook, body:d.editing?undefined:d.body, hashtags:d.hashtags, ask:d.ask,
      hasHashtags:!!(d.hashtags&&d.hashtags.trim()), hasAsk:!!(d.ask&&d.ask.trim()),
      photoTag:d.photo, tileUrl:tile,
      editing:d.editing, reading:!d.editing, editBuffer:d.editBuffer,
      cardStyle:`background:#fff;border:1px solid #E4E1D8;border-radius:13px;overflow:hidden;display:flex;flex-direction:column;`,
      onCopy:()=>this.copyDraft(d), onPark:()=>this.parkDraft(d), onPublish:()=>this.publishDraft(d),
      onQueue:()=>this.openQueue(d), onEdit:()=>this.editDraft(d.id),
      onEditInput:(e)=>this.editInput(d.id, e.target.value),
      onSaveEdit:()=>this.saveEdit(d.id), onCancelEdit:()=>this.cancelEdit(d.id),
      aiShorter:()=>this.aiEdit(d.id,'shorter'), aiWarmer:()=>this.aiEdit(d.id,'warmer'), aiPunchier:()=>this.aiEdit(d.id,'punchier'),
      img:{
        phase:im.phase,
        isIdle:im.phase==='idle', isGenerating:im.phase==='generating', isReady:im.phase==='ready',
        isBrand:im.mode==='brand', isPhoto:im.mode==='photo',
        shape:im.shape, dataUrl:im.dataUrl,
        photoUrl:photoUrl,
        photoBoxStyle:`width:100%;max-height:300px;aspect-ratio:${aspectCss};background-color:#102A44;background-position:center;background-repeat:no-repeat;background-size:contain;display:block;${photoUrl?`background-image:url("${photoUrl}");`:''}`,
        idleBoxStyle:`position:relative;aspect-ratio:${aspectCss};max-height:300px;background-image:linear-gradient(135deg,rgba(16,42,68,.82),rgba(14,30,52,.92)),url('${tile}');background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;`,
        genBoxStyle:`position:relative;aspect-ratio:${aspectCss};max-height:300px;background:linear-gradient(135deg,#102A44,#16365A);display:flex;flex-direction:column;align-items:center;justify-content:center;`,
        segSq:this.imgSeg(im.shape==='square'), segPt:this.imgSeg(im.shape==='portrait'), segLs:this.imgSeg(im.shape==='landscape'),
        onGenerate:()=>this.genPhoto(d.id), onRegen:()=>this.regenPhoto(d.id),
        onDownload:()=>this.downloadPhoto(d.id), onRemove:()=>this.removePhoto(d.id), onCanva:()=>this.openInCanva(d.id),
        onUpload:(e)=>this.uploadPhoto(d.id,e), onClearUpload:()=>this.clearUploadPhoto(d.id),
        onSquare:()=>this.setPhotoShape(d.id,'square'), onPortrait:()=>this.setPhotoShape(d.id,'portrait'), onWide:()=>this.setPhotoShape(d.id,'landscape'),
        onPickBank:()=>this.openBankPicker(d.id),
      },
      };
    });

    const tasks=st.queued.map(tk=>({ id:tk.id, when:tk.when, pillarName:this.pillarName(tk.pillar),
      hook:tk.hook, body:tk.body, note:tk.note, hasNote:!!tk.note,
      approveLabel: st.mode==='auto'?'Approve & auto-post':'Approve & post',
      onApprove:()=>this.approveTask(tk), onChanges:()=>this.requestChanges(tk), onCancel:()=>this.cancelTask(tk) }));

    const weekBatch=(st.weekBatch||[]).map(b=>({...b, onQueue:()=>this.queueBatch(b), onDone:()=>this.doneBatch(b)}));
    const parked=st.parked.map((pk,i)=>({hook:pk.hook, onRestore:()=>this.unpark(i)}));

    const queueSlots=this.allSlots().filter(s=>{const ss=this.slotStatus(s);return ss!=='done'&&ss!=='skipped';}).map(s=>({
      day:s.day, date:s.date, plan:s.plan, timeLabel:this.timeLabel(s), onPick:()=>this.pickQueueSlot(s) }));

    const published=st.published||[];
    const pTotals=published.reduce((a,p)=>{ const m=p.metrics||{}; a.impressions+=parseInt(m.impressions,10)||0; a.reactions+=parseInt(m.reactions,10)||0; a.comments+=parseInt(m.comments,10)||0; a.reposts+=parseInt(m.reposts,10)||0; return a; },{impressions:0,reactions:0,comments:0,reposts:0});
    const pFmt=(n)=>n>=1000?(n/1000).toFixed(n>=10000?0:1)+'k':String(n);
    const pTotalEng=pTotals.reactions+pTotals.comments+pTotals.reposts;
    const postList=published.map(p=>{ const m=p.metrics||{};
      const imp=parseInt(m.impressions,10)||0; const eng=(parseInt(m.reactions,10)||0)+(parseInt(m.comments,10)||0)+(parseInt(m.reposts,10)||0);
      const bodyPreview=(p.body||'').split('\n').filter(x=>x.trim()).slice(0,3).join('\n');
      return { id:p.id, dateLabel:p.dateLabel, pillarName:p.pillarName||'Post', hook:p.hook||'Logged from calendar',
        body:bodyPreview, hasBody:!!bodyPreview, hashtags:p.hashtags, hasHashtags:!!(p.hashtags&&p.hashtags.trim()),
        hasImg:!!p.imgUrl, imgStyle:`width:100%;height:100%;background:#0E2238 center center / cover no-repeat;${p.imgUrl?`background-image:url("${p.imgUrl}");`:''}`,
        impressions:m.impressions||'', reactions:m.reactions||'', comments:m.comments||'', reposts:m.reposts||'',
        rate: imp?((eng/imp)*100).toFixed(1)+'%':'—', hasRate:imp>0,
        note:p.note||'',
        onImp:(e)=>this.setMetric(p.id,'impressions',e.target.value),
        onReact:(e)=>this.setMetric(p.id,'reactions',e.target.value),
        onComm:(e)=>this.setMetric(p.id,'comments',e.target.value),
        onRepost:(e)=>this.setMetric(p.id,'reposts',e.target.value),
        onNote:(e)=>this.setPostNote(p.id,e.target.value),
        onDelete:()=>this.deletePost(p.id) };
    });
    const isJobad=st.pillar==='jobad';
    const isCustom=st.pillar==='custom';
    const genSubject=(st.anchor||'').trim();
    return {
      goCalendar:()=>this.setState({view:'calendar'}), goCompose:()=>this.setState({view:'compose'}), goApprovals:()=>this.setState({view:'approvals'}),
      goPosts:()=>this.setState({view:'posts'}), topPostsStyle:this.topBtn(view==='posts'),
      topCalStyle:this.topBtn(view==='calendar'), topComposeStyle:this.topBtn(view==='compose'), topApprStyle:this.topBtn(view==='approvals'),
      isAuto:st.mode==='auto', isManual:st.mode!=='auto',
      setManual:()=>this.setMode('manual'), setAuto:()=>this.setMode('auto'),
      modeSegManual:this.modeSeg(st.mode!=='auto'), modeSegAuto:this.modeSeg(st.mode==='auto'),
      isPosts:view==='posts', postsCount:published.length, hasPosts:published.length>0, noPosts:published.length===0,
      postList, exportPosts:()=>this.exportPosts(),
      sumImpressions:pFmt(pTotals.impressions), sumReactions:pFmt(pTotals.reactions), sumComments:pFmt(pTotals.comments), sumReposts:pFmt(pTotals.reposts),
      sumEngRate: pTotals.impressions?((pTotalEng/pTotals.impressions)*100).toFixed(1)+'%':'—',
      hasApprovals:tasks.length>0, approvalsCount:tasks.length,
      approveModeNote: st.mode==='auto'
        ? 'Auto-schedule is on. Approving a post publishes it automatically and tracks it on the Posts page.'
        : 'Manual mode. Approving opens the post so you can copy it and publish it yourself, then it is tracked on the Posts page.',
      viewTitle:t[0], viewSub:t[1],
      isCalendar:view==='calendar', isCompose:view==='compose', isApprovals:view==='approvals',
      nextUpText: next? `${next.day} ${next.date} · ${next.plan}` : 'All planned slots are sorted',
      nextUpSub: next? `${this.timeLabel(next)} · still needs a post` : 'Queue or prepare next week to stay ahead',
      nextUpStart: next? ()=>this.startSlot(next) : ()=>this.setState({view:'compose'}),
      prepareWeek:()=>this.prepareWeek(),
      setCalRows:()=>this.set({cal:'rows'}), setCalBoard:()=>this.set({cal:'board'}),
      segRows:this.seg(st.cal==='rows'), segBoard:this.seg(st.cal==='board'),
      calRows:st.cal==='rows', calBoard:st.cal==='board',
      weeks, boardCols:cols,
      pillars, hasPillar:!!st.pillar, selectedPillarName:this.pillarName(st.pillar),
      step2Label:isJobad?'FILL THE ROLE PANEL':(isCustom?'WRITE YOUR POST':'ADD A SUBJECT'),
      isJobad, isCustom, isAnchor:!!st.pillar && !isJobad && !isCustom,
      custom:st.custom, onCustom:(e)=>this.setState({custom:e.target.value}),
      anchor:st.anchor, onAnchor:(e)=>this.setState({anchor:e.target.value}),
      anchorPlaceholder:this.ANCHOR_PH[st.pillar]||'a moment, a trade, an angle',
      roleTitle:st.role.title, roleLoc:st.role.loc, roleType:st.role.type, roleSalary:st.role.salary, roleSummary:st.role.summary,
      onRoleTitle:(e)=>this.setState({role:{...st.role,title:e.target.value}}),
      onRoleLoc:(e)=>this.setState({role:{...st.role,loc:e.target.value}}),
      onRoleType:(e)=>this.setState({role:{...st.role,type:e.target.value}}),
      onRoleSalary:(e)=>this.setState({role:{...st.role,salary:e.target.value}}),
      onRoleSummary:(e)=>this.setState({role:{...st.role,summary:e.target.value}}),
      generate:()=>this.doGenerate(), generateLabel:isJobad?'Generate job ad drafts':(isCustom?'Polish & optimise my post':'Generate three drafts'),
      regenerate:()=>this.regenerate(),
      hasDrafts:drafts.length>0, drafts,
      genLoading:st.genLoading, genSubject, genSkeletons:st.polishMode?[0]:[0,1,2],
      genHeading:st.polishMode?'3 · POLISHING & OPTIMISING FOR REACH':'3 · WRITING THREE POSTS',
      showSubjectPill:!st.polishMode,
      draftsHeading:isCustom?'3 · YOUR OPTIMISED DRAFT':'3 · THREE DRAFTS · PICK ONE',
      showAngle: !!(st.anchor||'').trim() && st.pillar!=='jobad' && st.pillar!=='custom', angleText:(st.anchor||'').trim(),
      showPhotos:this.props.postsIncludePhotos ?? true,
      noPhotos:!(this.props.postsIncludePhotos ?? true),
      draftWrapStyle:'display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:start;',
      tasks, noApprovals:tasks.length===0,
      hasBatch:weekBatch.length>0, weekBatch, batchOf:st.batchOf,
      hasParked:parked.length>0, parked, parkedCount:parked.length,
      queueOpen:!!st.queueForId, queueSlots, closeQueue:()=>this.closeQueue(), stop:(e)=>e.stopPropagation(),
      handoffOpen:!!st.handoff, handoffText:st.handoff?st.handoff.text:'',
      handoffHasImg:!!(st.handoff&&st.handoff.imgUrl),
      handoffCopyLabel:(st.handoff&&st.handoff.copied)?'Copied to clipboard':'Copy post text',
      handoffImgNum:'2', handoffOpenNum:(st.handoff&&st.handoff.imgUrl)?'3':'2',
      closeHandoff:()=>this.closeHandoff(), handoffCopy:()=>this.handoffCopy(),
      handoffDownload:()=>this.handoffDownload(), openLinkedIn:()=>this.openLinkedIn(), handoffDone:()=>this.handoffDone(),
      bankCount:(st.bank||[]).length,
      bankPhotos:(st.bank||[]).map(p=>({id:p.id, name:p.name, boxStyle:`width:100%;height:100%;background-color:#0E2238;background-position:center;background-size:cover;background-repeat:no-repeat;${p.src?`background-image:url("${p.src}");`:''}`, onPick:()=>this.pickFromBank(p.id), onRemove:()=>this.removeFromBank(p.id), onCanva:()=>this.bankToCanva(p.id)})),
      bankEmpty:!((st.bank||[]).length), bankHas:((st.bank||[]).length)>0,
      bankModalOpen: st.bankOpen || !!st.bankPickForId,
      bankIsPicking: !!st.bankPickForId, bankIsManaging: st.bankOpen && !st.bankPickForId,
      bankTitle: st.bankPickForId? 'Choose a photo' : 'Photo bank',
      bankSub: st.bankPickForId? 'Tap a photo to drop it onto this post — it keeps the Ironside frame and headline.' : 'Your own real site and crew photos, saved once. Reuse them on any post.',
      openBankManager:()=>this.openBankManager(), closeBankModal:()=>this.closeBankModal(),
      onBankAdd:(e)=>this.addToBank(e),
      toastShow:!!st.toast, toastText:st.toast,
    };
  }

  slotVals(s){
    const status=this.slotStatus(s);
    const map={planned:{chip:'background:#FBE4D6;color:#B4561F;',label:'Planned',cellBg:'#FFFFFF',dot:'#F2C3AC'},
      queued:{chip:'background:#DCEFE0;color:#2E7D4F;',label:'Queued for approval',cellBg:'#FAFCFA',dot:'#9FD3AE'},
      done:{chip:'background:#E9E7E0;color:#8A8F98;',label:'Done',cellBg:'#F7F6F2',dot:'#CFCCC2'},
      skipped:{chip:'background:#EAE8E2;color:#9A9387;',label:'Not posting',cellBg:'#F4F3EF',dot:'#CFCCC2'}};
    const m=map[status];
    const isSkipped=status==='skipped';
    return {...s, prime:s.prime && !isSkipped, timeLabel:this.timeLabel(s),
      status, statusLabel:m.label, isPlanned:status==='planned', isDone:status==='done', isQueued:status==='queued',
      isSkipped, notSkipped:!isSkipped,
      cellStyle:`padding:15px 16px;border-right:1px solid #EEEBE2;border-top:1px solid #EEEBE2;background:${m.cellBg};min-height:148px;${isSkipped?'opacity:.72;':''}`,
      planStyle:`font-family:'Archivo';font-weight:700;font-size:14px;color:#1A2433;margin-top:11px;line-height:1.2;${isSkipped?'text-decoration:line-through;text-decoration-color:#BBB6AB;':''}`,
      planStyleBoard:`font-family:'Archivo';font-weight:700;font-size:13.5px;color:#1A2433;line-height:1.2;${isSkipped?'text-decoration:line-through;text-decoration-color:#BBB6AB;':''}`,
      chipStyle:`display:inline-block;font-family:'Archivo';font-weight:700;font-size:9.5px;letter-spacing:.06em;padding:3px 9px;border-radius:5px;${m.chip}`,
      startBtnStyle:`flex:1;border:none;border-radius:7px;padding:8px 0;font-family:'Archivo';font-weight:700;font-size:11.5px;cursor:pointer;${status==='done'?'background:#F1EFE9;color:#A6ABB3;':'background:#102A44;color:#fff;'}`,
      startLabel: status==='done'?'View':'Start',
      doneBtnStyle:`flex:1;border:1px solid ${status==='done'?'#9FD3AE':'#DCD9CF'};border-radius:7px;padding:8px 0;font-family:'Archivo';font-weight:700;font-size:11.5px;cursor:pointer;background:${status==='done'?'#ECF6EF':'#fff'};color:${status==='done'?'#2E7D4F':'#6B7686'};`,
      doneLabel: status==='done'?'✓ Done':'Mark done',
      skipBtnStyle:`flex:1;border:1px solid #DCD9CF;border-radius:7px;padding:8px 0;font-family:'Archivo';font-weight:700;font-size:11.5px;cursor:pointer;background:#fff;color:#9A9387;`,
      restoreBtnStyle:`flex:1;border:1px solid #DCD9CF;border-radius:7px;padding:8px 0;font-family:'Archivo';font-weight:700;font-size:11.5px;cursor:pointer;background:#fff;color:#6B7686;`,
      onStart:()=>this.startSlot(s), onDone:()=>this.markDone(s), onSkip:()=>this.skipSlot(s),
    };
  }

  // ===== render =====
  template(){
    const V=this.renderVals();
    const hexIcon=(w,h)=>`<svg width="${w}" height="${h}" viewBox="0 0 26 29" fill="none"><path d="M13 1.5 24 7.7v13.6L13 27.5 2 21.3V7.7z" stroke="#F37835" stroke-width="2.4" stroke-linejoin="round"></path><circle cx="13" cy="14.5" r="3.6" fill="#F37835"></circle></svg>`;
    const bolt=(w,h,col)=>`<svg width="${w}" height="${h}" viewBox="0 0 24 24" fill="none" stroke="${col||'currentColor'}" stroke-width="2.4"><path d="M13 2L3 14h7l-1 8 10-12h-7z"></path></svg>`;
    const spark=(w,h,col)=>`<svg width="${w}" height="${h}" viewBox="0 0 24 24" fill="none" stroke="${col||'currentColor'}" stroke-width="2"><path d="M5 3v4M3 5h4M6 17v4M4 19h4M13 3l2.5 6.5L22 12l-6.5 2.5L13 21l-2.5-6.5L4 12l6.5-2.5z"></path></svg>`;
    return `
<div style="display:flex;min-height:100vh;width:100%;background:#ECEAE3;">
  <div style="flex:1;min-width:0;display:flex;flex-direction:column;">

    <header style="background:#102A44;color:#fff;padding:0 28px;height:62px;display:flex;align-items:center;gap:26px;position:sticky;top:0;z-index:20;">
      <div style="display:flex;align-items:center;gap:9px;">
        <svg width="22" height="25" viewBox="0 0 26 29" fill="none"><path d="M13 1.5 24 7.7v13.6L13 27.5 2 21.3V7.7z" stroke="#F37835" stroke-width="2.4" stroke-linejoin="round"></path><circle cx="13" cy="14.5" r="3.6" fill="#F37835"></circle></svg>
        <div style="font-family:'Archivo';font-weight:800;letter-spacing:.14em;font-size:15px;">IRONSIDE</div>
        <div style="font-family:'Archivo';font-weight:600;letter-spacing:.24em;font-size:9px;color:#7E93AC;border-left:1px solid rgba(255,255,255,.18);padding-left:11px;margin-left:3px;">POST ENGINE</div>
      </div>
      <nav style="display:flex;gap:4px;margin-left:14px;">
        <button${ck(V.goCalendar)} style="${V.topCalStyle}">Calendar</button>
        <button${ck(V.goCompose)} style="${V.topComposeStyle}">Compose</button>
        <button${ck(V.goApprovals)} style="${V.topApprStyle}">Approvals${V.hasApprovals?`<span style="background:#F37835;color:#fff;font-family:'Archivo';font-weight:700;font-size:10px;min-width:18px;height:18px;padding:0 5px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;margin-left:7px;">${esc(V.approvalsCount)}</span>`:''}</button>
        <button${ck(V.goPosts)} style="${V.topPostsStyle}">Posts</button>
      </nav>
      <div style="margin-left:auto;display:flex;align-items:center;gap:14px;">
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
          ${V.isAuto?`<span title="Approved posts are scheduled and published automatically." style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#7FE0A8;font-family:'Archivo';font-weight:700;letter-spacing:.02em;">${bolt(12,12)}Auto-publishing on</span>`:''}
        </div>
        <div style="display:flex;background:rgba(255,255,255,.08);border-radius:9px;padding:3px;gap:2px;">
          <button${ck(V.setManual)} style="${V.modeSegManual}">Manual</button>
          <button${ck(V.setAuto)} style="${V.modeSegAuto}">Auto-schedule</button>
        </div>
      </div>
    </header>

    <div style="background:#fff;border-bottom:1px solid #E4E1D8;padding:16px 30px;display:flex;align-items:center;gap:18px;position:sticky;top:62px;z-index:10;">
      <div style="min-width:0;">
        <div style="font-family:'Archivo';font-weight:800;font-size:21px;color:#102A44;line-height:1;">${esc(V.viewTitle)}</div>
        <div style="font-size:12.5px;color:#6B7686;margin-top:5px;">${esc(V.viewSub)}</div>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:14px;">
        <button${ck(V.openBankManager)} style="display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid #DCD9CF;border-radius:9px;padding:8px 13px;font-family:'Archivo';font-weight:700;font-size:12.5px;color:#102A44;cursor:pointer;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#F37835" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2.4"></rect><circle cx="8.5" cy="8.5" r="1.6"></circle><path d="M21 15l-5-5L5 21"></path></svg>
          Photo bank
          <span style="background:#F1EEE7;color:#102A44;font-family:'Archivo';font-weight:700;font-size:11px;border-radius:7px;padding:1px 7px;min-width:18px;text-align:center;">${esc(V.bankCount)}</span>
        </button>
        <img src="${ASSETS['logo']}" alt="Ironside Resources" style="height:26px;width:auto;opacity:.92;">
      </div>
    </div>

    <div class="pe-scroll" style="flex:1;overflow-y:auto;">
      ${V.isCalendar?this.viewCalendar(V,{bolt}):''}
      ${V.isCompose?this.viewCompose(V,{spark,hexIcon}):''}
      ${V.isApprovals?this.viewApprovals(V,{bolt}):''}
      ${V.isPosts?this.viewPosts(V):''}
    </div>
  </div>

  ${this.modalBank(V)}
  ${this.modalQueue(V)}
  ${this.modalHandoff(V)}
  ${V.toastShow?`<div style="position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#102A44;color:#fff;padding:13px 22px;border-radius:11px;font-size:13.5px;font-weight:600;z-index:60;box-shadow:0 16px 40px -12px rgba(0,0,0,.5);display:flex;align-items:center;gap:10px;"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#F37835" stroke-width="2.4"><path d="M20 6 9 17l-5-5"></path></svg>${esc(V.toastText)}</div>`:''}
</div>`;
  }

  viewCalendar(V,I){
    const slotBtns=(s)=> s.notSkipped
      ? `<button${ck(s.onStart)} style="${s.startBtnStyle}">${esc(s.startLabel)}</button><button${ck(s.onDone)} style="${s.doneBtnStyle}">${esc(s.doneLabel)}</button><button${ck(s.onSkip)} style="${s.skipBtnStyle}" title="Not posting this one">Skip</button>`
      : `<button${ck(s.onSkip)} style="${s.restoreBtnStyle}">Put back on calendar</button>`;
    const rows=V.weeks.map(wk=>`
      <div style="background:#fff;border:1px solid #E4E1D8;border-radius:14px;overflow:hidden;">
        <div style="display:flex;align-items:center;gap:10px;padding:13px 18px;background:#F7F5F0;border-bottom:1px solid #E9E6DD;">
          <span style="font-family:'Archivo';font-weight:800;font-size:13px;color:#102A44;letter-spacing:.02em;">${esc(wk.label)}</span>
          <span style="font-size:11.5px;color:#9AA2AE;">week of ${esc(wk.of)}</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);">
          ${wk.slots.map(s=>`
            <div style="${s.cellStyle}">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:9px;">
                <span style="font-family:'Archivo';font-weight:700;font-size:13px;color:#102A44;">${esc(s.day)}</span>
                <span style="font-size:11px;color:#9AA2AE;">${esc(s.date)}</span>
                ${s.prime?`<span style="font-family:'Archivo';font-weight:700;font-size:8.5px;letter-spacing:.1em;color:#fff;background:#F37835;padding:2px 6px;border-radius:4px;">PRIME</span>`:''}
              </div>
              <div style="${s.chipStyle}">${esc(s.statusLabel)}</div>
              <div style="${s.planStyle}">${esc(s.plan)}</div>
              <div style="font-size:11.5px;color:#8A93A0;margin-top:3px;">${esc(s.timeLabel)}</div>
              <div style="display:flex;gap:7px;margin-top:13px;">${slotBtns(s)}</div>
            </div>`).join('')}
        </div>
      </div>`).join('');
    const board=V.boardCols.map(col=>`
      <div style="background:#fff;border:1px solid #E4E1D8;border-radius:14px;overflow:hidden;">
        <div style="padding:13px 16px;border-bottom:1px solid #E9E6DD;display:flex;align-items:center;gap:8px;background:${col.headBg};">
          <span style="width:10px;height:10px;border-radius:3px;background:${col.dot};"></span>
          <span style="font-family:'Archivo';font-weight:800;font-size:12.5px;color:#102A44;">${esc(col.title)}</span>
          <span style="margin-left:auto;font-family:'Archivo';font-weight:700;font-size:12px;color:#9AA2AE;">${esc(col.count)}</span>
        </div>
        <div style="padding:12px;display:flex;flex-direction:column;gap:10px;min-height:80px;">
          ${col.items.map(s=>`
            <div style="border:1px solid #ECE9E0;border-radius:10px;padding:12px 13px;background:#FCFBF8;">
              <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:nowrap;white-space:nowrap;">
                <span style="font-family:'Archivo';font-weight:700;font-size:12px;color:#102A44;">${esc(s.day)} ${esc(s.date)}</span>
                ${s.prime?`<span style="font-family:'Archivo';font-weight:700;font-size:8px;letter-spacing:.08em;color:#fff;background:#F37835;padding:2px 5px;border-radius:4px;">PRIME</span>`:''}
              </div>
              <div style="${s.planStyleBoard}">${esc(s.plan)}</div>
              <div style="font-size:11px;color:#8A93A0;margin-top:2px;">${esc(s.timeLabel)}</div>
              <div style="display:flex;gap:6px;margin-top:11px;">${ s.notSkipped
                ? `<button${ck(s.onStart)} style="${s.startBtnStyle}">${esc(s.startLabel)}</button><button${ck(s.onDone)} style="${s.doneBtnStyle}">${esc(s.doneLabel)}</button><button${ck(s.onSkip)} style="${s.skipBtnStyle}" title="Not posting this one">Skip</button>`
                : `<button${ck(s.onSkip)} style="${s.restoreBtnStyle}">Put back</button>` }</div>
            </div>`).join('')}
        </div>
      </div>`).join('');
    return `
    <div style="padding:26px 30px 60px;max-width:1180px;margin:0 auto;">
      <div style="display:flex;gap:16px;align-items:stretch;margin-bottom:22px;flex-wrap:wrap;">
        <div style="flex:1;min-width:340px;background:linear-gradient(120deg,#102A44,#1B3F63);border-radius:14px;padding:20px 22px;color:#fff;display:flex;align-items:center;gap:20px;box-shadow:0 10px 26px -16px rgba(16,42,68,.7);">
          <div style="flex:1;min-width:0;">
            <div style="font-family:'Archivo';font-weight:700;font-size:10.5px;letter-spacing:.16em;color:#F8A06A;">NEXT UP</div>
            <div style="font-family:'Archivo';font-weight:800;font-size:19px;margin-top:6px;line-height:1.15;">${esc(V.nextUpText)}</div>
            <div style="font-size:12.5px;color:#AEBED0;margin-top:4px;">${esc(V.nextUpSub)}</div>
          </div>
          <button${ck(V.nextUpStart)} style="background:#F37835;color:#fff;border:none;border-radius:9px;padding:12px 20px;font-family:'Archivo';font-weight:700;font-size:13.5px;cursor:pointer;white-space:nowrap;box-shadow:0 6px 16px -8px rgba(243,120,53,.9);">Start drafting →</button>
        </div>
      </div>

      <div style="background:#fff;border:1px solid #E4E1D8;border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:12px;min-width:240px;margin-bottom:14px;">
        <div style="font-size:12.5px;color:#6B7686;line-height:1.45;text-align:center;">Draft the whole week ahead in one go, ready to review and approve.</div>
        <button${ck(V.prepareWeek)} style="background:#102A44;color:#fff;border:none;border-radius:9px;padding:11px 16px;font-family:'Archivo';font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">${I.bolt(15,15)}Prepare next week</button>
      </div>

      <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:14px;">
          <span style="display:flex;align-items:center;gap:6px;font-size:11.5px;color:#6B7686;"><span style="width:10px;height:10px;border-radius:3px;background:#F2C3AC;"></span>Planned</span>
          <span style="display:flex;align-items:center;gap:6px;font-size:11.5px;color:#6B7686;"><span style="width:10px;height:10px;border-radius:3px;background:#9FD3AE;"></span>Queued for approval</span>
          <span style="display:flex;align-items:center;gap:6px;font-size:11.5px;color:#6B7686;"><span style="width:10px;height:10px;border-radius:3px;background:#CFCCC2;"></span>Done</span>
        </div>
        <div style="margin-left:auto;display:flex;align-items:center;gap:7px;">
          <span style="font-size:10px;font-family:'Archivo';font-weight:700;letter-spacing:.1em;color:#9AA2AE;">CALENDAR</span>
          <div style="display:flex;background:#EFEDE6;border-radius:8px;padding:3px;">
            <button${ck(V.setCalRows)} style="${V.segRows}">Weeks</button>
            <button${ck(V.setCalBoard)} style="${V.segBoard}">Board</button>
          </div>
        </div>
      </div>

      ${V.calRows?`<div style="display:flex;flex-direction:column;gap:16px;">${rows}</div>`:''}
      ${V.calBoard?`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start;">${board}</div>`:''}
    </div>`;
  }

  draftImageBlock(d){
    const im=d.img;
    const refresh=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"></path></svg>`;
    const shapeRow=`<div style="display:flex;flex:1;background:#EFEDE6;border-radius:8px;padding:3px;gap:2px;"><button${ck(im.onSquare)} style="${im.segSq}">1:1</button><button${ck(im.onPortrait)} style="${im.segPt}">4:5</button><button${ck(im.onWide)} style="${im.segLs}">Wide</button></div>`;
    let inner='';
    if(im.isIdle){
      inner=`
        <div style="${im.idleBoxStyle}">
          <div style="position:absolute;top:11px;left:13px;display:flex;align-items:center;gap:6px;">
            <svg width="13" height="15" viewBox="0 0 26 29" fill="none"><path d="M13 1.5 24 7.7v13.6L13 27.5 2 21.3V7.7z" stroke="#F37835" stroke-width="2.4" stroke-linejoin="round"></path><circle cx="13" cy="14.5" r="3.6" fill="#F37835"></circle></svg>
            <span style="font-family:'Archivo';font-weight:800;font-size:9px;letter-spacing:.14em;color:#fff;">IRONSIDE</span>
          </div>
          <div style="position:absolute;top:10px;right:12px;font-family:'Archivo';font-weight:700;font-size:8.5px;letter-spacing:.08em;color:#fff;background:rgba(0,0,0,.32);padding:3px 7px;border-radius:5px;">PHOTO · ${esc(d.photoTag)}</div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:11px;padding:18px;text-align:center;">
            <div style="font-family:'Archivo';font-weight:700;font-size:9.5px;letter-spacing:.18em;color:#7E93AC;">POST IMAGE</div>
            <button${ck(im.onGenerate)} style="background:#F37835;color:#fff;border:none;border-radius:9px;padding:11px 18px;font-family:'Archivo';font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;box-shadow:0 8px 18px -10px rgba(243,120,53,.9);">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3v4M3 5h4M6 17v4M4 19h4M13 3l2.5 6.5L22 12l-6.5 2.5L13 21l-2.5-6.5L4 12l6.5-2.5z"></path></svg>
              Generate photo
            </button>
            <div style="display:flex;align-items:center;gap:10px;font-size:11px;color:#9FB1C6;">
              <button${ck(im.onPickBank)} style="background:none;border:none;color:#9FB1C6;cursor:pointer;text-decoration:underline;text-underline-offset:2px;font-size:11px;padding:0;font-family:inherit;">Choose from photo bank</button>
              <span style="color:#54677C;">·</span>
              <label style="cursor:pointer;text-decoration:underline;text-underline-offset:2px;">upload your own<input type="file" accept="image/*"${ch(im.onUpload)} style="display:none;"></label>
            </div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:#fff;border-bottom:1px solid #EFECE3;">
          <span style="font-size:9px;font-family:'Archivo';font-weight:700;letter-spacing:.1em;color:#9AA2AE;">SHAPE</span>
          ${shapeRow}
        </div>`;
    } else if(im.isGenerating){
      inner=`<div style="${im.genBoxStyle}"><div style="width:34px;height:34px;border:3px solid rgba(255,255,255,.18);border-top-color:#F37835;border-radius:50%;animation:pe-spin .8s linear infinite;"></div><div style="font-family:'Archivo';font-weight:700;font-size:12px;letter-spacing:.04em;color:#AEBED0;margin-top:13px;">Generating image…</div></div>`;
    } else if(im.isReady){
      const swapRow = im.isBrand
        ? `<button${ck(im.onPickBank)} style="background:none;border:none;font-size:11.5px;color:#3E6E9C;font-weight:600;cursor:pointer;padding:0;display:inline-flex;align-items:center;gap:5px;font-family:inherit;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2.4"></rect><circle cx="8.5" cy="8.5" r="1.6"></circle><path d="M21 15l-5-5L5 21"></path></svg>From bank</button>
           <label style="font-size:11.5px;color:#3E6E9C;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 9l5-5 5 5M12 4v12"></path></svg>Upload<input type="file" accept="image/*"${ch(im.onUpload)} style="display:none;"></label>`
        : `<label style="font-size:11.5px;color:#3E6E9C;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 9l5-5 5 5M12 4v12"></path></svg>Swap photo<input type="file" accept="image/*"${ch(im.onUpload)} style="display:none;"></label>
           <button${ck(im.onClearUpload)} style="background:none;border:none;font-size:11.5px;color:#8A93A0;font-weight:600;cursor:pointer;padding:0;">Back to branded</button>`;
      inner=`
        <div style="${im.photoBoxStyle}"></div>
        <div style="padding:11px 14px;background:#fff;border-bottom:1px solid #EFECE3;display:flex;flex-direction:column;gap:9px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:9px;font-family:'Archivo';font-weight:700;letter-spacing:.1em;color:#9AA2AE;">SHAPE</span>
            ${shapeRow}
          </div>
          <div style="display:flex;gap:7px;flex-wrap:wrap;">
            <button${ck(im.onRegen)} style="flex:1 1 100px;min-width:0;display:flex;align-items:center;justify-content:center;gap:7px;border:1px solid #DCD9CF;background:#fff;border-radius:8px;padding:9px;font-family:'Archivo';font-weight:700;font-size:12px;color:#102A44;cursor:pointer;">${refresh}Regenerate</button>
            <button${ck(im.onDownload)} style="flex:1 1 100px;min-width:0;display:flex;align-items:center;justify-content:center;gap:7px;border:none;background:#102A44;color:#fff;border-radius:8px;padding:9px;font-family:'Archivo';font-weight:700;font-size:12px;cursor:pointer;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12M7 11l5 4 5-4M5 21h14"></path></svg>Download</button>
          </div>
          <button${ck(im.onCanva)} style="display:flex;align-items:center;justify-content:center;gap:7px;width:100%;border:1px solid #C7D7E6;background:#EEF4FA;border-radius:8px;padding:9px;font-family:'Archivo';font-weight:700;font-size:12px;color:#1B5E8C;cursor:pointer;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M21 3l-9 9M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h5"></path></svg>Edit in Canva</button>
          <div style="display:flex;align-items:center;gap:12px;">
            ${swapRow}
            <button${ck(im.onRemove)} style="margin-left:auto;background:none;border:none;font-size:11.5px;color:#A6ADB7;font-weight:600;cursor:pointer;padding:0;">Remove</button>
          </div>
        </div>`;
    }
    return `<div style="position:relative;background:#0E2238;">${inner}</div>`;
  }

  draftCard(V,d){
    const reading=`
      <div style="font-size:13px;line-height:1.62;color:#2A3340;white-space:pre-wrap;flex:1;">${esc(d.body)}</div>
      ${d.hasHashtags?`<div style="font-size:12px;color:#3E6E9C;margin-top:12px;line-height:1.5;font-weight:500;">${esc(d.hashtags)}</div>`:''}
      ${d.hasAsk?`<div style="font-size:12.5px;color:#5A6470;margin-top:9px;line-height:1.5;font-style:italic;border-left:2px solid #F37835;padding-left:10px;">${esc(d.ask)}</div>`:''}
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-top:15px;padding-top:14px;border-top:1px solid #EFECE3;">
        <button${ck(d.onQueue)} style="background:#F37835;color:#fff;border:none;border-radius:8px;padding:9px 15px;font-family:'Archivo';font-weight:700;font-size:12.5px;cursor:pointer;flex:1;min-width:130px;display:inline-flex;align-items:center;justify-content:center;gap:7px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>Send for approval</button>

              ${p.hasImg?`<div style="flex:none;width:92px;height:92px;border-radius:10px;overflow:hidden;border:1px solid #E4E1D8;"><div style="${p.imgStyle}"></div></div>`:''}
              <div style="flex:1;min-width:0;">
                <div style="font-family:'Archivo';font-weight:700;font-size:14px;color:#1A2433;line-height:1.3;">${esc(p.hook)}</div>
                ${p.hasBody?`<div style="font-size:12.5px;line-height:1.55;color:#6B7686;margin-top:7px;white-space:pre-wrap;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;">${esc(p.body)}</div>`:''}
                ${p.hasHashtags?`<div style="font-size:11.5px;color:#6E8DB0;margin-top:8px;">${esc(p.hashtags)}</div>`:''}
              </div>
            </div>
            <div style="padding:13px 18px;background:#FCFBF8;border-top:1px solid #EFECE3;display:flex;align-items:flex-end;gap:11px;flex-wrap:wrap;">
              ${['IMPRESSIONS','REACTIONS','COMMENTS','REPOSTS'].map((lab,i)=>{const keys=['impressions','reactions','comments','reposts'];const hs=[p.onImp,p.onReact,p.onComm,p.onRepost];const w=[88,76,76,76][i];return `<label style="display:flex;flex-direction:column;gap:5px;"><span style="font-size:9px;font-family:'Archivo';font-weight:700;letter-spacing:.08em;color:#9AA2AE;">${lab}</span><input value="${esc(p[keys[i]])}"${ip(hs[i])} placeholder="0" inputmode="numeric" style="width:${w}px;border:1px solid #DCD9CF;border-radius:7px;padding:7px 10px;font-size:13px;font-family:'Archivo';font-weight:700;color:#102A44;background:#fff;"></label>`;}).join('')}
              <label style="flex:1;min-width:170px;display:flex;flex-direction:column;gap:5px;"><span style="font-size:9px;font-family:'Archivo';font-weight:700;letter-spacing:.08em;color:#9AA2AE;">NOTE</span><input value="${esc(p.note)}"${ip(p.onNote)} placeholder="What worked, what to try next…" style="width:100%;border:1px solid #DCD9CF;border-radius:7px;padding:7px 11px;font-size:12.5px;color:#2A3340;background:#fff;"></label>
            </div>
          </div>`).join('')}
      </div>` : '';
    const empty = V.noPosts ? `
      <div style="background:#fff;border:1px dashed #D8D4C9;border-radius:14px;padding:46px;text-align:center;">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#C9CDD4" stroke-width="1.7" style="margin:0 auto 13px;display:block;"><path d="M4 4h16v16H4z"></path><path d="M8 14l3-3 2 2 3-4"></path></svg>
        <div style="font-family:'Archivo';font-weight:700;font-size:15px;color:#102A44;">No posts logged yet</div>
        <div style="font-size:12.5px;color:#8A93A0;max-width:380px;margin:6px auto 0;line-height:1.5;">Every post you mark done lands here automatically. Then add its LinkedIn numbers to see what is working, and export the lot to a spreadsheet.</div>
        <button${ck(V.goCalendar)} style="margin-top:16px;background:#F37835;color:#fff;border:none;border-radius:9px;padding:11px 20px;font-family:'Archivo';font-weight:700;font-size:13px;cursor:pointer;">Back to calendar</button>
      </div>` : '';
    return `
    <div style="padding:26px 30px 60px;max-width:1180px;margin:0 auto;">
      <div style="display:flex;gap:16px;align-items:stretch;margin-bottom:22px;flex-wrap:wrap;">
        <div style="flex:1;min-width:420px;display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:#E4E1D8;border:1px solid #E4E1D8;border-radius:14px;overflow:hidden;">
          ${stat(V.postsCount,'POSTS')}${stat(V.sumImpressions,'IMPRESSIONS')}${stat(V.sumReactions,'REACTIONS')}${stat(V.sumComments,'COMMENTS')}${stat(V.sumEngRate,'ENG. RATE',true)}
        </div>
        <button${ck(V.exportPosts)} style="flex:none;background:#102A44;color:#fff;border:none;border-radius:14px;padding:0 22px;font-family:'Archivo';font-weight:700;font-size:13.5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;min-width:150px;box-shadow:0 10px 24px -16px rgba(16,42,68,.8);">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#F37835" stroke-width="2"><path d="M12 3v12M7 11l5 4 5-4M5 21h14"></path></svg>
          Export CSV
          <span style="font-size:10.5px;font-weight:500;color:#AEBED0;font-family:'Public Sans';">Track in a spreadsheet</span>
        </button>
      </div>
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:13px;">
        <span style="font-family:'Archivo';font-weight:700;font-size:11px;letter-spacing:.13em;color:#9AA2AE;">PUBLISHED · ${esc(V.postsCount)}</span>
        <span style="font-size:11.5px;color:#9AA2AE;">Newest first · drop in the numbers from LinkedIn as they come in</span>
      </div>
      ${list}
      ${empty}
    </div>`;
  }

  modalBank(V){
    if(!V.bankModalOpen) return '';
    const empty = V.bankEmpty ? `
      <div style="text-align:center;padding:34px 20px;border:1px dashed #D8D4C9;border-radius:13px;background:#FCFBF8;">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#C9CDD4" stroke-width="1.7" style="margin:0 auto 13px;display:block;"><rect x="3" y="3" width="18" height="18" rx="2.4"></rect><circle cx="8.5" cy="8.5" r="1.8"></circle><path d="M21 15l-5-5L5 21"></path></svg>
        <div style="font-family:'Archivo';font-weight:700;font-size:15px;color:#102A44;">No photos saved yet</div>
        <div style="font-size:12.5px;color:#8A93A0;margin:6px auto 0;max-width:340px;line-height:1.5;">Add your real photos — crews on site, finished jobs, the workshop, you at the desk. They live here so you never have to re-upload.</div>
        <label style="margin-top:16px;display:inline-flex;align-items:center;gap:7px;background:#102A44;color:#fff;border-radius:9px;padding:10px 18px;font-family:'Archivo';font-weight:700;font-size:13px;cursor:pointer;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"></path></svg>Add your first photos<input type="file" accept="image/*" multiple${ch(V.onBankAdd)} style="display:none;"></label>
      </div>` : '';
    const grid = V.bankHas ? `
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
        ${V.bankPhotos.map(ph=>`
          <div style="position:relative;border-radius:11px;overflow:hidden;border:1px solid #E4E1D8;background:#0E2238;aspect-ratio:1 / 1;">
            <div style="${ph.boxStyle}"></div>
            ${V.bankIsPicking?`<button${ck(ph.onPick)} style="position:absolute;inset:0;border:none;cursor:pointer;background:rgba(16,42,68,0);display:flex;align-items:flex-end;justify-content:center;padding-bottom:14px;"><span style="font-family:'Archivo';font-weight:700;font-size:12px;color:#fff;background:#F37835;border-radius:7px;padding:6px 13px;box-shadow:0 6px 14px -6px rgba(0,0,0,.6);">Use this</span></button>`:''}
            <button${ck(ph.onRemove)} title="Remove" style="position:absolute;top:7px;right:7px;width:25px;height:25px;border-radius:7px;border:none;background:rgba(16,28,42,.72);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;line-height:1;z-index:2;">×</button>
            ${V.bankIsManaging?`<div style="position:absolute;left:0;right:0;bottom:0;padding:18px 8px 7px;background:linear-gradient(transparent,rgba(8,20,34,.86));display:flex;align-items:center;gap:6px;"><span style="flex:1;min-width:0;font-size:10.5px;font-weight:600;color:#EAF0F6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(ph.name)}</span><button${ck(ph.onCanva)} title="Open in Canva" style="flex:none;display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.94);border:none;border-radius:6px;padding:4px 8px;font-family:'Archivo';font-weight:700;font-size:10.5px;color:#1B5E8C;cursor:pointer;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M15 3h6v6M21 3l-9 9M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h5"></path></svg>Canva</button></div>`:''}
            ${V.bankIsPicking?`<div style="position:absolute;left:0;right:0;bottom:0;padding:14px 9px 7px;background:linear-gradient(transparent,rgba(8,20,34,.82));pointer-events:none;font-size:10.5px;font-weight:600;color:#EAF0F6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(ph.name)}</div>`:''}
          </div>`).join('')}
      </div>
      <div style="font-size:11.5px;color:#9AA2AE;margin-top:14px;display:flex;align-items:center;gap:7px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#F37835" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4M12 8h.01"></path></svg>Saved on this device. Pick one to wrap it in the Ironside frame, or open it in Canva to brand and edit it yourself.</div>` : '';
    return `
    <div style="position:fixed;inset:0;background:rgba(16,28,42,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:24px;"${ck(V.closeBankModal)}>
      <div style="background:#fff;border-radius:16px;width:640px;max-width:94vw;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 70px -20px rgba(0,0,0,.5);"${ck(V.stop)}>
        <div style="padding:18px 22px;border-bottom:1px solid #EFECE3;display:flex;align-items:center;gap:13px;">
          <svg width="22" height="25" viewBox="0 0 26 29" fill="none" style="flex:none;"><path d="M13 1.5 24 7.7v13.6L13 27.5 2 21.3V7.7z" stroke="#F37835" stroke-width="2.4" stroke-linejoin="round"></path><circle cx="13" cy="14.5" r="3.6" fill="#F37835"></circle></svg>
          <div style="min-width:0;">
            <div style="font-family:'Archivo';font-weight:800;font-size:16px;color:#102A44;">${esc(V.bankTitle)}</div>
            <div style="font-size:12px;color:#6B7686;margin-top:3px;line-height:1.4;">${esc(V.bankSub)}</div>
          </div>
          <label style="margin-left:auto;flex:none;background:#F37835;color:#fff;border-radius:9px;padding:9px 15px;font-family:'Archivo';font-weight:700;font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;box-shadow:0 8px 18px -10px rgba(243,120,53,.9);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"></path></svg>Add photos<input type="file" accept="image/*" multiple${ch(V.onBankAdd)} style="display:none;"></label>
        </div>
        <div class="pe-scroll" style="padding:18px 20px;overflow-y:auto;flex:1;">${empty}${grid}</div>
        <div style="padding:13px 18px;border-top:1px solid #EFECE3;display:flex;justify-content:flex-end;">
          <button${ck(V.closeBankModal)} style="background:#fff;border:1px solid #DCD9CF;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;color:#6B7686;cursor:pointer;">Done</button>
        </div>
      </div>
    </div>`;
  }

  modalQueue(V){
    if(!V.queueOpen) return '';
    return `
    <div style="position:fixed;inset:0;background:rgba(16,28,42,.5);display:flex;align-items:center;justify-content:center;z-index:50;"${ck(V.closeQueue)}>
      <div style="background:#fff;border-radius:16px;width:440px;max-width:92vw;overflow:hidden;box-shadow:0 30px 70px -20px rgba(0,0,0,.5);"${ck(V.stop)}>
        <div style="padding:18px 22px;border-bottom:1px solid #EFECE3;">
          <div style="font-family:'Archivo';font-weight:800;font-size:16px;color:#102A44;">Queue for approval</div>
          <div style="font-size:12.5px;color:#6B7686;margin-top:4px;">Pick a slot. The finished post comes back to you here at that time. It never publishes until you approve.</div>
        </div>
        <div style="padding:14px 18px;display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto;">
          ${V.queueSlots.map(q=>`
            <button${ck(q.onPick)} style="display:flex;align-items:center;gap:12px;text-align:left;background:#FCFBF8;border:1px solid #E9E6DD;border-radius:10px;padding:12px 14px;cursor:pointer;">
              <span style="width:9px;height:9px;border-radius:3px;background:#F2C3AC;flex:none;"></span>
              <span style="font-family:'Archivo';font-weight:700;font-size:13.5px;color:#102A44;">${esc(q.day)} ${esc(q.date)}</span>
              <span style="font-size:12px;color:#8A93A0;">${esc(q.timeLabel)}</span>
              <span style="margin-left:auto;font-size:11.5px;color:#9AA2AE;">${esc(q.plan)}</span>
            </button>`).join('')}
        </div>
        <div style="padding:13px 18px;border-top:1px solid #EFECE3;display:flex;justify-content:flex-end;">
          <button${ck(V.closeQueue)} style="background:#fff;border:1px solid #DCD9CF;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;color:#6B7686;cursor:pointer;">Cancel</button>
        </div>
      </div>
    </div>`;
  }

  modalHandoff(V){
    if(!V.handoffOpen) return '';
    const imgStep = V.handoffHasImg ? `
      <div style="display:flex;gap:13px;">
        <span style="flex:none;width:24px;height:24px;border-radius:50%;background:#102A44;color:#fff;font-family:'Archivo';font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;">${esc(V.handoffImgNum)}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-family:'Archivo';font-weight:700;font-size:13.5px;color:#102A44;margin-bottom:7px;">Save the image</div>
          <div style="font-size:12px;color:#6B7686;line-height:1.5;margin-bottom:9px;">Download it now, then attach it in LinkedIn when you paste.</div>
          <button${ck(V.handoffDownload)} style="display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid #DCD9CF;border-radius:8px;padding:9px 15px;font-family:'Archivo';font-weight:700;font-size:12.5px;color:#102A44;cursor:pointer;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F37835" stroke-width="2"><path d="M12 3v12M7 11l5 4 5-4M5 21h14"></path></svg>Download image</button>
        </div>
      </div>` : '';
    return `
    <div style="position:fixed;inset:0;background:rgba(16,28,42,.52);display:flex;align-items:center;justify-content:center;z-index:55;padding:20px;"${ck(V.closeHandoff)}>
      <div style="background:#fff;border-radius:16px;width:580px;max-width:94vw;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 70px -20px rgba(0,0,0,.5);animation:pe-pop .18s ease;"${ck(V.stop)}>
        <div style="padding:18px 22px;border-bottom:1px solid #EFECE3;display:flex;align-items:center;gap:12px;">
          <div style="width:36px;height:36px;border-radius:9px;background:#0A66C2;display:flex;align-items:center;justify-content:center;flex:none;"><svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M4.98 3.5A2.5 2.5 0 1 1 5 8.5a2.5 2.5 0 0 1-.02-5zM3 9h4v12H3zM9 9h3.8v1.7h.05c.53-.95 1.83-1.95 3.77-1.95 4.03 0 4.78 2.5 4.78 5.76V21h-4v-5.3c0-1.27-.02-2.9-1.9-2.9-1.9 0-2.2 1.38-2.2 2.8V21H9z"></path></svg></div>
          <div style="flex:1;min-width:0;">
            <div style="font-family:'Archivo';font-weight:800;font-size:16px;color:#102A44;">Post to LinkedIn</div>
            <div style="font-size:12px;color:#6B7686;margin-top:2px;">Hand the finished post to LinkedIn. Nothing posts automatically — you press Post yourself.</div>
          </div>
          <button${ck(V.closeHandoff)} style="flex:none;background:#F4F2EC;border:none;border-radius:8px;width:30px;height:30px;font-size:17px;color:#6B7686;cursor:pointer;line-height:1;">×</button>
        </div>
        <div class="pe-scroll" style="padding:18px 22px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;">
          <div style="display:flex;gap:13px;">
            <span style="flex:none;width:24px;height:24px;border-radius:50%;background:#102A44;color:#fff;font-family:'Archivo';font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;">1</span>
            <div style="flex:1;min-width:0;">
              <div style="font-family:'Archivo';font-weight:700;font-size:13.5px;color:#102A44;margin-bottom:7px;">Copy the post text</div>
              <div style="border:1px solid #E4E1D8;border-radius:10px;background:#FAF9F5;padding:12px 13px;font-size:12.5px;line-height:1.55;color:#2A3340;white-space:pre-wrap;max-height:170px;overflow-y:auto;">${esc(V.handoffText)}</div>
              <button${ck(V.handoffCopy)} style="margin-top:9px;display:inline-flex;align-items:center;gap:8px;background:#F37835;color:#fff;border:none;border-radius:8px;padding:9px 15px;font-family:'Archivo';font-weight:700;font-size:12.5px;cursor:pointer;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>${esc(V.handoffCopyLabel)}</button>
            </div>
          </div>
          ${imgStep}
          <div style="display:flex;gap:13px;">
            <span style="flex:none;width:24px;height:24px;border-radius:50%;background:#102A44;color:#fff;font-family:'Archivo';font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;">${esc(V.handoffOpenNum)}</span>
            <div style="flex:1;min-width:0;">
              <div style="font-family:'Archivo';font-weight:700;font-size:13.5px;color:#102A44;margin-bottom:7px;">Open LinkedIn and paste</div>
              <div style="font-size:12px;color:#6B7686;line-height:1.5;margin-bottom:9px;">Opens the LinkedIn composer in a new tab. Paste with Ctrl/Cmd&nbsp;+&nbsp;V, attach your image, then press Post.</div>
              <button${ck(V.openLinkedIn)} style="display:inline-flex;align-items:center;gap:8px;background:#0A66C2;color:#fff;border:none;border-radius:8px;padding:9px 15px;font-family:'Archivo';font-weight:700;font-size:12.5px;cursor:pointer;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 3h6v6M21 3l-9 9M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h5"></path></svg>Open LinkedIn composer</button>
            </div>
          </div>
        </div>
        <div style="padding:13px 18px;border-top:1px solid #EFECE3;display:flex;align-items:center;gap:10px;">
          <div style="font-size:11.5px;color:#9AA2AE;flex:1;line-height:1.4;">Done it? Mark it posted to clear it from your drafts.</div>
          <button${ck(V.closeHandoff)} style="background:#fff;border:1px solid #DCD9CF;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;color:#6B7686;cursor:pointer;">Not yet</button>
          <button${ck(V.handoffDone)} style="background:#2E7D4F;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-family:'Archivo';font-weight:700;font-size:13px;cursor:pointer;">Mark as posted</button>
        </div>
      </div>
    </div>`;
  }

  render(){
    if(this._silent) return;
    CB = [];
    const root=document.getElementById('app');
    root.innerHTML = this.template();
    this.wire(root);
  }
  wire(root){
    root.querySelectorAll('[data-click]').forEach(el=>{ const f=CB[+el.getAttribute('data-click')];
      if(f) el.addEventListener('click', (e)=>{ f(e); }); });
    root.querySelectorAll('[data-input]').forEach(el=>{ const f=CB[+el.getAttribute('data-input')];
      if(f){ el.addEventListener('input', (e)=>{ this._silent=true; try{ f(e); } finally{ this._silent=false; } });
             el.addEventListener('change', ()=>this.render()); } });
    root.querySelectorAll('[data-change]').forEach(el=>{ const f=CB[+el.getAttribute('data-change')];
      if(f) el.addEventListener('change', (e)=>{ f(e); }); });
  }
}

// ===== boot =====
const engine = new Engine();
window.engine = engine;
engine.render();
engine.componentDidMount();
</script>
</body>
</html>
