<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Queen Envy Hair">
  <title>Queen Envy Hair</title>
  <defs>
    <linearGradient id="qeh-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7E7A8" />
      <stop offset="45%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#8C6A1A" />
    </linearGradient>
    <linearGradient id="qeh-gold-soft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E9C766" />
      <stop offset="100%" stop-color="#B7892A" />
    </linearGradient>
    <radialGradient id="qeh-glow" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#3A2A0B" stop-opacity="0.0" />
      <stop offset="100%" stop-color="#0B0B0B" stop-opacity="0.0" />
    </radialGradient>
  </defs>

  <!-- Subtle backdrop ring -->
  <circle cx="60" cy="62" r="54" fill="url(#qeh-glow)" />
  <circle cx="60" cy="62" r="53.5" fill="none" stroke="url(#qeh-gold-soft)" stroke-width="0.8" opacity="0.6" />

  <!-- Hair: long flowing locks framing the face -->
  <path d="M32 64
           C 28 50, 34 34, 48 28
           C 52 22, 68 22, 72 28
           C 86 34, 92 50, 88 64
           C 92 78, 86 96, 78 106
           C 74 100, 72 92, 72 84
           L 72 70
           C 72 78, 68 84, 60 86
           C 52 84, 48 78, 48 70
           L 48 84
           C 48 92, 46 100, 42 106
           C 34 96, 28 78, 32 64 Z"
        fill="url(#qeh-gold)" />

  <!-- Face silhouette -->
  <path d="M48 60
           C 48 52, 53 46, 60 46
           C 67 46, 72 52, 72 60
           C 72 68, 67 76, 60 76
           C 53 76, 48 68, 48 60 Z"
        fill="#FBF6E7" />

  <!-- Neck + shoulders hint -->
  <path d="M54 76 L54 82 C 50 84, 46 88, 44 94 L 76 94 C 74 88, 70 84, 66 82 L 66 76 Z"
        fill="#FBF6E7" />

  <!-- Crown -->
  <g>
    <!-- Crown band -->
    <path d="M44 40 L76 40 L74 46 L46 46 Z" fill="url(#qeh-gold)" stroke="#7A5A12" stroke-width="0.4" />
    <!-- Three points -->
    <path d="M46 40 L52 28 L57 38 L60 26 L63 38 L68 28 L74 40 Z"
          fill="url(#qeh-gold)" stroke="#7A5A12" stroke-width="0.5" stroke-linejoin="round" />
    <!-- Gem dots on points -->
    <circle cx="52" cy="28" r="1.6" fill="#FFF4C2" stroke="#7A5A12" stroke-width="0.3" />
    <circle cx="60" cy="26" r="1.8" fill="#FFF4C2" stroke="#7A5A12" stroke-width="0.3" />
    <circle cx="68" cy="28" r="1.6" fill="#FFF4C2" stroke="#7A5A12" stroke-width="0.3" />
    <!-- Center jewel on band -->
    <circle cx="60" cy="43" r="1.6" fill="#FFF4C2" stroke="#7A5A12" stroke-width="0.3" />
  </g>

  <!-- Subtle face features -->
  <path d="M55 60 q1.5 -1.5 3 0" fill="none" stroke="#C7A24A" stroke-width="0.6" stroke-linecap="round" />
  <path d="M62 60 q1.5 -1.5 3 0" fill="none" stroke="#C7A24A" stroke-width="0.6" stroke-linecap="round" />
  <path d="M58 66 q2 1.5 4 0" fill="none" stroke="#C7A24A" stroke-width="0.6" stroke-linecap="round" />
</svg>
